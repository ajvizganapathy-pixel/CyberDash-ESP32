<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>CyberDash — ESP32 Telemetry</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-scan" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark"></span>
    <span class="brand-name">CYBER<span>DASH</span></span>
    <span class="brand-tag">ESP32 // TELEMETRY</span>
  </div>
  <div class="status">
    <span class="pill" id="ws-pill"><i class="dot"></i><span id="ws-text">CONNECTING</span></span>
    <span class="pill" id="sd-pill"><i class="dot"></i>SD</span>
    <span class="pill" id="wifi-pill"><i class="dot"></i>WIFI</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</header>

<main class="grid">

  <section class="card card-lg" data-metric="temp">
    <header><span class="label">TEMPERATURE</span><span class="unit">°C</span></header>
    <div class="value"><span id="t">--</span></div>
    <div class="meta"><span id="t-delta" class="delta">Δ --</span><span id="t-range" class="range">— / —</span></div>
    <canvas id="t-chart" class="spark"></canvas>
  </section>

  <section class="card" data-metric="hum">
    <header><span class="label">HUMIDITY</span><span class="unit">%</span></header>
    <div class="value"><span id="h">--</span></div>
    <div class="gauge"><i id="h-bar"></i></div>
  </section>

  <section class="card" data-metric="pres">
    <header><span class="label">PRESSURE</span><span class="unit">hPa</span></header>
    <div class="value"><span id="p">--</span></div>
    <div class="meta"><span id="p-trend" class="delta">→ stable</span></div>
  </section>

  <section class="card card-lg" data-metric="sound">
    <header><span class="label">SOUND LEVEL</span><span class="unit">dB</span></header>
    <div class="value"><span id="d">--</span></div>
    <div class="gauge gauge-tall"><i id="d-bar"></i></div>
    <canvas id="d-chart" class="spark"></canvas>
  </section>

  <section class="card card-wide">
    <header><span class="label">SYSTEM</span><span class="unit">live</span></header>
    <ul class="kv">
      <li><span>uptime</span><b id="uptime">--</b></li>
      <li><span>last update</span><b id="last">--</b></li>
      <li><span>endpoint</span><b><a href="/api/data">/api/data</a></b></li>
      <li><span>log</span><b><a href="/log.csv" download>log.csv</a></b></li>
      <li><span>OTA</span><b><a href="/update">/update</a></b></li>
    </ul>
  </section>

</main>

<footer class="footbar">
  <span>// CyberDash v1.0 · ESP32 · FreeRTOS</span>
  <span id="hostinfo"></span>
</footer>

<script src="/app.js"></script>
</body>
</html>
