name: pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'flasher.html'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp index.html flasher.html _site/
          [ -d assets ] && cp -r assets _site/ || true
          [ -f README.md ] && cp README.md _site/
          # Disable Jekyll so files like _foo aren't dropped
          touch _site/.nojekyll
          ls -la _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
