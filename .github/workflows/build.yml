name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'index.html'
      - 'flasher.html'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    name: PlatformIO build (esp32dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Use placeholder secrets for CI build
        run: cp secrets.example.h secrets.h

      - name: Build firmware
        env:
          PLATFORMIO_BUILD_FLAGS: >-
            -DCYBERDASH_CI=1
            -DCYBERDASH_BUILD_TAG=\"${{ github.ref_name }}\"
            -DCYBERDASH_BUILD_SHA=\"${{ github.sha }}\"
        run: pio run -e esp32dev

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            dist/firmware.bin
            dist/bootloader.bin
            dist/partitions.bin
            dist/manifest.json
          if-no-files-found: error
          retention-days: 14
