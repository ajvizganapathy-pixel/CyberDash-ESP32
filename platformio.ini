; CyberDash - ESP32 PlatformIO project
; Keeps the existing flat layout (CyberDash.ino + *.cpp/*.h at project root)

[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform        = espressif32
board           = esp32dev
framework       = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed    = 921600

board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

extra_scripts =
    post:scripts/package_release.py

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    !python -c "import os; tag=os.environ.get('GITHUB_REF_NAME','dev'); sha=os.environ.get('GITHUB_SHA','local')[:7]; print(f'-DCYBERDASH_BUILD_TAG=\\\\\"{tag}\\\\\" -DCYBERDASH_BUILD_SHA=\\\\\"{sha}\\\\\"')"

build_unflags =
    -Og

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    me-no-dev/AsyncTCP@^1.1.1
    me-no-dev/ESP Async WebServer@^1.2.4
    bblanchon/ArduinoJson@^7.0.4
    ; LittleFS is part of the espressif32 Arduino core (no lib_dep needed)

; ---- OTA upload (uncomment after first serial flash) ----
; upload_protocol  = espota
; upload_port      = cyberdash.local
; upload_flags     =
;     --auth=changeme

[env:esp32dev-ota]
extends          = env:esp32dev
upload_protocol  = espota
upload_port      = cyberdash.local
upload_flags     =
    --auth=changeme
